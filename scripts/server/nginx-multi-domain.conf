# /etc/nginx/sites-available/gisprof-multi.conf
#
# Мультидоменный конфиг НПК «Оборон-Экран».
# Каждый домен — отдельный статический сайт с собственным uz2-focused контентом.
# После правок: sudo nginx -t && sudo systemctl reload nginx
#
# Подготовка:
#   1) scripts/build-all-variants.sh (локально) → dist/<host>/
#   2) Залить dist/* на VPS в /home/deploy/sites/<host>/
#   3) sudo certbot --nginx -d gisprof.ru -d www.gisprof.ru   (и аналогично для каждого host)
#   4) Запустить этот файл как sites-available и создать symlink в sites-enabled.
#
# API /api/lead (из public/api/lead.php) — уже лежит в каждом docroot.

# ---------- helpers: security & cache ----------
map $sent_http_content_type $expires_val {
    default                 off;
    ~*(text|application).(html|xml)$   -1;  # не кэшируем HTML
    ~*(image|font|javascript|css)      max;  # асеты на год
}

# Upstream PHP-FPM (проверяй версию: php-fpm -v)
# php8.3 — дефолт в Ubuntu 24.04
upstream gisprof_php {
    server unix:/run/php/php8.3-fpm.sock;
}

# ============================================================================
# 1. gisprof.ru — main (федеральный флагман)
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name gisprof.ru www.gisprof.ru;
    return 301 https://gisprof.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gisprof.ru;

    ssl_certificate     /etc/letsencrypt/live/gisprof.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gisprof.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /home/deploy/sites/gisprof.ru;
    index index.html;

    charset utf-8;
    expires $expires_val;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location = /api/lead {
        fastcgi_pass gisprof_php;
        fastcgi_param SCRIPT_FILENAME $document_root/api/lead.php;
        fastcgi_param REQUEST_METHOD  $request_method;
        fastcgi_param CONTENT_TYPE    $content_type;
        fastcgi_param CONTENT_LENGTH  $content_length;
        include fastcgi_params;
        client_max_body_size 64k;
    }
    location ~ ^/api/.*\.php$ { return 404; }

    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    access_log /var/log/nginx/gisprof.ru.access.log;
    error_log  /var/log/nginx/gisprof.ru.error.log warn;
}

# www → без www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.gisprof.ru;
    ssl_certificate     /etc/letsencrypt/live/gisprof.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gisprof.ru/privkey.pem;
    return 301 https://gisprof.ru$request_uri;
}

