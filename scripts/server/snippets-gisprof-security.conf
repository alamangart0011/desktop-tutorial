# /etc/nginx/snippets/gisprof-security.conf
#
# Единый блок security-заголовков для всех server { } блоков сети gisprof.
# Подключение: внутри server { include snippets/gisprof-security.conf; }
#
# Перезагрузка: sudo nginx -t && sudo systemctl reload nginx

# Базовые заголовки (всегда отдаём, в т.ч. на 4xx/5xx)
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "0" always;  # современные браузеры игнорируют, явно отключаем legacy

# HSTS — 2 года, includeSubDomains, preload-готов
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Permissions-Policy — отключаем всё, что не нужно лендингу
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=(), browsing-topics=()" always;

# Cross-Origin-* — изоляция от любых third-party окон
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Запрет crossdomain.xml / clientaccesspolicy.xml (Flash-эра)
add_header X-Permitted-Cross-Domain-Policies "none" always;

# CSP — разрешаем только наши домены + Яндекс.Метрику и (опц.) Яндекс.Карты iframe
# 'unsafe-inline' нужен для JSON-LD <script> и Tailwind v4 inline-стилей
# Если форма работает через api.web3forms.com — добавь в connect-src
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://yandex.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://mc.yandex.ru https://yandex.ru; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://mc.yandex.ru https://yandex.ru; frame-src https://yandex.ru https://mc.yandex.ru; frame-ancestors 'self'; form-action 'self' mailto:; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;
